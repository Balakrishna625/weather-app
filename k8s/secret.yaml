apiVersion: v1
kind: Secret
metadata:
  name: weather-secrets
  labels:
    app: weather-dashboard
type: Opaque
data:
  # IMPORTANT: Replace with your actual OpenWeatherMap API key
  # To encode your API key: echo -n "YOUR_ACTUAL_API_KEY" | base64
  # Get your free API key from: https://openweathermap.org/api
  OPENWEATHER_API_KEY: WU9VUl9BQ1RVQUxfQVBJX0tFWQ==  # YOUR_ACTUAL_API_KEY (placeholder)
  ADMIN_PASSWORD: YWRtaW4xMjM=  # admin123
---
# Alternative: Using stringData for easier configuration
# Uncomment this section and replace with your actual values
apiVersion: v1
kind: Secret
metadata:
  name: weather-secrets-stringdata
  labels:
    app: weather-dashboard
type: Opaque
stringData:
  # Replace with your actual OpenWeatherMap API key
  OPENWEATHER_API_KEY: "YOUR_ACTUAL_API_KEY_HERE"
  ADMIN_PASSWORD: "admin123"