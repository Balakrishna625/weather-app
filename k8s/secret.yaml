    app: weather-dashboard
type: Opaque
stringData:
  OPENWEATHER_API_KEY: "N2Y5YWU4NGZkYTdhMTM0MTZkNTQ2NjVlOTk4YmFlYzYK"
  ADMIN_PASSWORD: "admin123"
  DB_PASSWORD: "supersecret123"