apiVersion: v1
kind: Secret
metadata:
  name: weather-secrets
  labels:
    app: weather-dashboard
type: Opaque
data:
  # Base64 encoded values
  # To encode: echo -n "your-actual-api-key" | base64
  OPENWEATHER_API_KEY: N2Y5YWU4NGZkYTdhMTM0MTZkNTQ2NjVlOTk4YmFlYzYK  # demo-api-key
  ADMIN_PASSWORD: YWRtaW4xMjM=  # admin123
